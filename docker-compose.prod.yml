services:
  app:
    image: ${APP_IMAGE}
    container_name: dropshop-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      # AWS ElastiCache 사용 시: redis 제거
      - redis
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - dropshop-net

  # ============================================
  # Redis 설정
  # ============================================
  # 옵션 1: 로컬 Docker Redis (개발/테스트)
  # 아래 서비스 활성화
  redis:
    image: redis:7-alpine
    container_name: dropshop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - dropshop-net

  # 옵션 2: AWS ElastiCache 사용 (프로덕션 권장)
  # 1. 위 redis 서비스 제거
  # 2. 위 app.depends_on에서 redis 제거
  # 3. .env 파일에 다음 환경변수 설정:
  #    REDIS_HOST=dropshop-redis.xxxx.cache.amazonaws.com
  #    REDIS_PORT=6379
  #    REDIS_PASSWORD={auth-token}
  #    REDIS_USE_SSL=true
  # 4. ELASTICACHE_SETUP.md 문서 참조

  kafka-1:
    image: bitnami/kafka:3.7
    container_name: dropshop-kafka-1
    restart: unless-stopped
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=dropshop-kraft-cluster-2026
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_1_data:/bitnami/kafka
    networks:
      dropshop-net:
        aliases:
          - kafka-1

  kafka-2:
    image: bitnami/kafka:3.7
    container_name: dropshop-kafka-2
    restart: unless-stopped
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_KRAFT_CLUSTER_ID=dropshop-kraft-cluster-2026
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-2:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_2_data:/bitnami/kafka
    networks:
      dropshop-net:
        aliases:
          - kafka-2

  kafka-3:
    image: bitnami/kafka:3.7
    container_name: dropshop-kafka-3
    restart: unless-stopped
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_KRAFT_CLUSTER_ID=dropshop-kraft-cluster-2026
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-3:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_3_data:/bitnami/kafka
    networks:
      dropshop-net:
        aliases:
          - kafka-3

volumes:
  redis_data:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:

networks:
  dropshop-net:
    driver: bridge


