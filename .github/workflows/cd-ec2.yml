name: CD-EC2-Docker

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-ec2-main
  cancel-in-progress: false

env:
  APP_NAME: dropshop
  DEPLOY_DIR: ${{ vars.EC2_DEPLOY_DIR }}
  MIN_DISK_MB: ${{ vars.EC2_MIN_DISK_MB || '1024' }}

jobs:
  build-and-push:
    name: build-and-push-image
    runs-on: ubuntu-latest

    outputs:
      image_repo: ${{ steps.image-repo.outputs.image_repo }}
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      full_image: ${{ steps.image-tag.outputs.full_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot jar
        run: ./gradlew --no-daemon --console=plain clean bootJar -x test

      - name: Resolve image repository
        id: image-repo
        run: echo "image_repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: image-tag
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ steps.image-repo.outputs.image_repo }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image-repo.outputs.image_repo }}:latest
            ${{ steps.image-tag.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: deploy-compose-to-ec2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production env file
        run: |
          printf '%s\n' "$PROD_ENV_FILE" > .env
          echo "APP_IMAGE=${{ needs.build-and-push.outputs.full_image }}" >> .env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "docker-compose.prod.yml,.env,scripts/ec2-preflight.sh"
          target: "/tmp/${{ env.APP_NAME }}"

      - name: Deploy Docker Compose on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: APP_NAME,DEPLOY_DIR,MIN_DISK_MB
          script: |
            set -euo pipefail
            trap 'echo "[deploy] failed at line $LINENO" >&2' ERR
            set -x
            sudo mkdir -p "${DEPLOY_DIR}"
            sudo mv "/tmp/${APP_NAME}/docker-compose.prod.yml" "${DEPLOY_DIR}/docker-compose.yml"
            sudo mv "/tmp/${APP_NAME}/.env" "${DEPLOY_DIR}/.env"
            sudo mkdir -p "${DEPLOY_DIR}/scripts"
            sudo mv "/tmp/${APP_NAME}/scripts/ec2-preflight.sh" "${DEPLOY_DIR}/scripts/ec2-preflight.sh"
            sudo chown -R "${USER}:${USER}" "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"

            chmod +x "${DEPLOY_DIR}/scripts/ec2-preflight.sh"
            "${DEPLOY_DIR}/scripts/ec2-preflight.sh" "${DEPLOY_DIR}" "${MIN_DISK_MB}"

            PREV_IMAGE="$(docker inspect --format='{{.Config.Image}}' dropshop-app 2>/dev/null || true)"
            if [ -n "${PREV_IMAGE}" ]; then
              echo "Detected previous image: ${PREV_IMAGE}"
            else
              echo "No existing dropshop-app container found."
            fi

            rollback() {
              echo "Attempting rollback..."
              if [ -n "${PREV_IMAGE}" ]; then
                if grep -q '^APP_IMAGE=' .env; then
                  sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${PREV_IMAGE}|" .env
                else
                  echo "APP_IMAGE=${PREV_IMAGE}" >> .env
                fi
                docker compose --env-file .env -f docker-compose.yml up -d --remove-orphans || true
                echo "Rollback completed with previous image: ${PREV_IMAGE}"
              else
                echo "Rollback skipped: previous image not found."
              fi
            }

            set +e
            docker compose --env-file .env -f docker-compose.yml pull
            pull_status=$?

            up_status=0
            if [ "${pull_status}" -eq 0 ]; then
              docker compose --env-file .env -f docker-compose.yml up -d --remove-orphans
              up_status=$?
            fi
            set -e

            if [ "${pull_status}" -ne 0 ] || [ "${up_status}" -ne 0 ]; then
              echo "Deployment failed (pull=${pull_status}, up=${up_status})."
              rollback
              exit 1
            fi

            APP_PORT="$(awk -F= '/^APP_PORT=/{print $2}' .env | tail -n1)"
            APP_PORT="${APP_PORT:-8080}"
            health_status=0
            for i in $(seq 1 12); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:${APP_PORT}/actuator/health || true)
              if [ "${STATUS}" = "200" ]; then
                echo "Health check passed (attempt ${i})"
                health_status=1
                break
              fi
              echo "Attempt ${i}/12: status=${STATUS}, retrying in 10s..."
              sleep 10
            done

            if [ "${health_status}" -eq 0 ]; then
              echo "Health check failed after 120s."
              rollback
              exit 1
            fi

            docker compose --env-file .env -f docker-compose.yml ps
            docker image prune -f


