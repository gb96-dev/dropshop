name: CI

on:
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: build-test-checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile (main/test)
        run: ./gradlew --no-daemon --console=plain compileJava compileTestJava

      - name: Spotless format check
        continue-on-error: true
        run: ./gradlew --no-daemon --console=plain spotlessCheck

      - name: Run unit tests
        run: ./gradlew --no-daemon --console=plain test

      - name: Google Checkstyle gate
        run: ./gradlew --no-daemon --console=plain checkstyleMain checkstyleTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore

      - name: Upload checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: build/reports/checkstyle
          if-no-files-found: ignore

