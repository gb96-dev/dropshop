spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    topic:
      partitions: 1
      replication-factor: 1
  data:
    redis:
      host: localhost
      port: 6379

portone:
  api-base-url: https://api.portone.io
  api-secret: test_secret
  store-id: test-store
  channel-key: test-channel
  redirect-url: http://localhost:8080/payments/redirect

cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      access-key: dummy_key
      secret-key: dummy_secret

product:
  image-upload:
    bucket: dummy-bucket
    region: ap-northeast-2
    key-prefix: products
    cdn-base-url: http://localhost:8080
    presigned-expiration-seconds: 300

dropshop:
  product:
    max-image-count: 5
    purchasable-block-hours: 24
  drops:
    view-count-ttl-seconds: 600

jwt:
  secret: test-jwt-secret-key-for-unit-tests-only-32chars

openai:
  api-key: test-openai-api-key
  embedding-model: text-embedding-3-small
  chat-model: gpt-4o-mini

pinecone:
  api-key: test-pinecone-api-key
  host: https://test-pinecone.local

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
