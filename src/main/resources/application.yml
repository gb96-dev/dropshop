spring:
  config:
    import: optional:file:./application-local.yml
  main:
    allow-circular-references: true
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
    topic:
      partitions: ${SPRING_KAFKA_TOPIC_PARTITIONS:3}
      replication-factor: ${SPRING_KAFKA_TOPIC_REPLICATION_FACTOR:1}  # 운영에서는 2~3 권장
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간 (밀리초)
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_USE_SSL:true}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
        shutdown-timeout: 100ms

# PortOne 설정
portone:
  api-base-url: ${PORTONE_API_BASE_URL:https://api.portone.io}
  api-secret: "dummy_secret"
  store-id: "store-dummy"
  channel-key: "channel-dummy"
  redirect-url: ${PORTONE_REDIRECT_URL:http://localhost:8080/payments/redirect}
  retry-max-attempts: ${PORTONE_RETRY_MAX_ATTEMPTS:3}
  retry-initial-delay-millis: ${PORTONE_RETRY_INITIAL_DELAY_MILLIS:300}
  retry-backoff-multiplier: ${PORTONE_RETRY_BACKOFF_MULTIPLIER:2.0}

# AWS 설정
cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      access-key: "dummy_key"
      secret-key: "dummy_secret"

# 이미지 업로드 관련
product:
  image-upload:
    bucket: "dummy-bucket"
    region: ap-northeast-2
    key-prefix: "products"
    cdn-base-url: "http://localhost:8080"
    presigned-expiration-seconds: 300

dropshop:
  product:
    max-image-count: 5
    purchasable-block-hours: 24
  drops:
    view-count-ttl-seconds: 600

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: TRACE

server:
  port: 8080

openai:
  api-key: "dummy"
  embedding-model: "text-embedding-3-small"
  chat-model: "gpt-4o-mini"

pinecone:
  api-key: "dummy"
  host: "https://dummy.pinecone.io"
  index-name: "dropshop-products"
