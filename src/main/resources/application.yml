spring:
  config:
    import: optional:file:./application-local.yml
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:mysql://localhost:3306/dropshop?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 12345678
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094
    topic:
      partitions: 3
      replication-factor: 1

# PortOne 설정
portone:
  api-base-url: ${PORTONE_API_BASE_URL:https://api.portone.io}
  api-secret: "dummy_secret"
  store-id: "store-dummy"
  channel-key: "channel-dummy"
  redirect-url: ${PORTONE_REDIRECT_URL:http://localhost:8080/payments/redirect}

# AWS 설정
cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      access-key: "dummy_key"
      secret-key: "dummy_secret"

# ✅ 이미지 업로드 관련
product:
  image-upload:
    bucket: "dummy-bucket"
    region: ap-northeast-2
    key-prefix: "products"
    cdn-base-url: "http://localhost:8080"
    presigned-expiration-seconds: 300

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


server:
  port: 8081
