spring:
  datasource:
    url: jdbc:mysql://localhost:3307/dropshop?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: dropshop
    password: dropshop123

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  h2:
    console:
      enabled: false

product:
  policy:
    deliveryInfo: "기본 배송 정책: 평일 1-2일 배송"
    refundPolicy: "기본 환불 정책: 수령 후 7일 이내 미개봉 상태에서만 가능"
  image-upload:
      bucket: drop-product-image-574070665489-ap-northeast-2-an  # 생성한 버킷 이름
      region: ap-northeast-2
      key-prefix: products
      cdn-base-url: https://drop-product-image-574070665489-ap-northeast-2-an.s3.ap-northeast-2.amazonaws.com
      presigned-expiration-seconds: 300

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY}  # secret.yml 또는 환경변수에서 설정
    secret-key: ${AWS_SECRET_KEY}  # secret.yml 또는 환경변수에서 설정

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE







